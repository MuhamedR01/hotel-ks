# ──────────────────────────────────────────────────────────────
#  Hotel KS — Docker Compose (Coolify-ready, separate services)
# ──────────────────────────────────────────────────────────────
#
#  Domains:
#    hotel-ks.com           → frontend  (React SPA)
#    api.hotel-ks.com       → api       (Laravel API)
#    dashboard.hotel-ks.com → dashboard (Laravel Blade)
#
#  Usage:
#    docker compose up -d --build
#
# ──────────────────────────────────────────────────────────────

services:
  # ── MySQL Database ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-hotel_ks}
      MYSQL_USER: ${DB_USERNAME:-hotel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hotel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel API (api.hotel-ks.com) ──────────────────────────
  api:
    build:
      context: ./laravel-backend
      dockerfile: Dockerfile
      args:
        SERVICE_ROLE: api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: "Hotel KS API"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${API_URL:-https://api.hotel-ks.com}
      APP_LOCALE: sq

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-hotel_ks}
      DB_USERNAME: ${DB_USERNAME:-hotel_user}
      DB_PASSWORD: ${DB_PASSWORD}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-hotel-ks.com,dashboard.hotel-ks.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://hotel-ks.com}

      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
    ports:
      - "${API_PORT:-8000}:80"
    networks:
      - hotel-network

  # ── Laravel Dashboard (dashboard.hotel-ks.com) ──────────────
  dashboard:
    build:
      context: ./laravel-backend
      dockerfile: Dockerfile
      args:
        SERVICE_ROLE: dashboard
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      APP_NAME: "Hotel KS Dashboard"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${DASHBOARD_URL:-https://dashboard.hotel-ks.com}
      APP_LOCALE: sq

      # Dashboard routes live at root (/) on its own domain
      DASHBOARD_PATH: ""

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-hotel_ks}
      DB_USERNAME: ${DB_USERNAME:-hotel_user}
      DB_PASSWORD: ${DB_PASSWORD}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-hotel-ks.com,dashboard.hotel-ks.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://hotel-ks.com}
    ports:
      - "${DASHBOARD_PORT:-8001}:80"
    networks:
      - hotel-network

  # ── React Frontend (hotel-ks.com) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${API_URL:-https://api.hotel-ks.com}/api
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - hotel-network

volumes:
  mysql_data:

networks:
  hotel-network:
    driver: bridge
