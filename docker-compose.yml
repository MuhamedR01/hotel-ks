# ──────────────────────────────────────────────────────────────
#  Hotel KS — Docker Compose (Coolify-ready, separate services)
# ──────────────────────────────────────────────────────────────
#
#  Domains:
#    hotel-ks.com           → frontend  (React SPA)
#    api.hotel-ks.com       → api       (Laravel API)
#    dashboard.hotel-ks.com → dashboard (Laravel Blade)
#
#  MySQL is managed as a separate Coolify database resource.
#  Connect via DB_HOST / DB_DATABASE / DB_USERNAME / DB_PASSWORD.
#
# ──────────────────────────────────────────────────────────────

services:
  # ── Laravel API (api.hotel-ks.com) ──────────────────────────
  api:
    build:
      context: ./laravel-backend
      dockerfile: Dockerfile
      args:
        SERVICE_ROLE: api
    restart: unless-stopped
    environment:
      APP_NAME: "Hotel KS API"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${API_URL:-https://api.hotel-ks.com}
      APP_LOCALE: sq

      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-default}
      DB_USERNAME: ${DB_USERNAME:-mysql}
      DB_PASSWORD: ${DB_PASSWORD}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-hotel-ks.com,dashboard.hotel-ks.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://hotel-ks.com}

      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
    networks:
      - hotel-network

  # ── Laravel Dashboard (dashboard.hotel-ks.com) ──────────────
  dashboard:
    build:
      context: ./laravel-backend
      dockerfile: Dockerfile
      args:
        SERVICE_ROLE: dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      APP_NAME: "Hotel KS Dashboard"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${DASHBOARD_URL:-https://dashboard.hotel-ks.com}
      APP_LOCALE: sq

      # Dashboard routes live at root (/) on its own domain
      DASHBOARD_PATH: ""

      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-default}
      DB_USERNAME: ${DB_USERNAME:-mysql}
      DB_PASSWORD: ${DB_PASSWORD}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-hotel-ks.com,dashboard.hotel-ks.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://hotel-ks.com}
    networks:
      - hotel-network

  # ── React Frontend (hotel-ks.com) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${API_URL:-https://api.hotel-ks.com}/api
    restart: unless-stopped
    networks:
      - hotel-network

networks:
  hotel-network:
    driver: bridge
